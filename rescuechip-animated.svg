<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <style>
      .logo-mark {
        transform: scale(0);
        animation: popIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      
      .heart-container {
        animation: heartbeat 0.86s infinite cubic-bezier(0.25, 1, 0.5, 1);
        animation-delay: 1s;
      }
      
      .ecg-line {
        stroke-dasharray: 320;
        stroke-dashoffset: 320;
        animation: drawEcg 1.72s linear infinite;
        animation-delay: 1s;
      }
      
      .text-rescue {
        opacity: 0;
        transform: translateY(30px);
        animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 0.3s;
      }
      
      .text-chip {
        opacity: 0;
        transform: translateY(30px);
        animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 0.5s;
      }
      
      @keyframes popIn {
        0% { transform: scale(0); }
        100% { transform: scale(1); }
      }
      
      @keyframes heartbeat {
        0% { transform: scale(1); }
        15% { transform: scale(1.08); }
        30% { transform: scale(1); }
        100% { transform: scale(1); }
      }
      
      @keyframes drawEcg {
        0% { stroke-dashoffset: 320; opacity: 0; }
        5% { opacity: 1; }
        60% { stroke-dashoffset: 0; opacity: 1; }
        80% { stroke-dashoffset: 0; opacity: 0; }
        100% { stroke-dashoffset: 320; opacity: 0; }
      }
      
      @keyframes fadeInUp {
        0% {
          opacity: 0;
          transform: translateY(30px);
        }
        100% {
          opacity: 1;
          transform: translateY(0px);
        }
      }
    </style>
  </defs>

  <!-- Background is transparent by default -->
  
  <g transform="translate(250, 190)">
    <g class="logo-mark">
      <!-- Star of Life -->
      <g fill="#CC0000">
        <rect x="-40" y="-130" width="80" height="260" rx="4" ry="4" />
        <rect x="-40" y="-130" width="80" height="260" rx="4" ry="4" transform="rotate(60)" />
        <rect x="-40" y="-130" width="80" height="260" rx="4" ry="4" transform="rotate(-60)" />
      </g>
      
      <!-- Heart and ECG -->
      <g class="heart-container">
        <!-- White Heart -->
        <path d="M 0,-15 
                 C -25,-50 -80,-40 -80,5 
                 C -80,45 -30,65 0,95 
                 C 30,65 80,45 80,5 
                 C 80,-40 25,-50 0,-15 Z" 
              fill="#FFFFFF" />
              
        <!-- Red ECG Line -->
        <path class="ecg-line" 
              d="M -60,15 L -30,15 L -20,30 L -5,-35 L 10,60 L 20,0 L 30,15 L 60,15" 
              fill="none" stroke="#CC0000" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" />
      </g>
    </g>
  </g>

  <!-- Text Section -->
  <text x="246" y="400" font-family="'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="76" text-anchor="end" fill="#111111" class="text-rescue" letter-spacing="1">RESCUE</text>
  <text x="254" y="400" font-family="'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="76" text-anchor="start" fill="#CC0000" class="text-chip" letter-spacing="1">CHIP</text>
</svg>
